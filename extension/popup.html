
<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>RegionShot</title>
  <style>
    :root{
      --bg:#ffffff;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --border:#e2e8f0;
      --shadow: 0 10px 24px rgba(2,6,23,.12);
    }

    body{
      width: 320px;
      margin: 0;
      padding: 14px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
    }

    .card{
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .header{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .logo{
      width:36px;height:36px;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(37,99,235,.18), rgba(16,185,129,.16));
      border: 1px solid rgba(37,99,235,.18);
      display:flex;align-items:center;justify-content:center;
      flex: 0 0 auto;
    }
    .titleWrap{ text-align:left; flex: 1 1 120px; min-width: 0; }
    .title{ font-size: 14px; font-weight: 800; color: var(--text); line-height: 1.1; }
    .subtitle{ font-size: 11px; color: var(--muted); margin-top: 2px; }

    .actions{ display:flex; flex-direction:column; gap:10px; }

    button{
      width: 100%;
      padding: 11px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #ffffff;
      cursor: pointer;
      display:flex;
      align-items:center;
      justify-content:space-between;
      font-weight: 700;
      color: var(--text);
      transition: transform .08s ease, box-shadow .15s ease, border-color .15s ease, background .15s ease;
      box-shadow: 0 3px 10px rgba(2,6,23,.06);
      user-select: none;
    }
    button:hover{ border-color: rgba(15,23,42,.22); box-shadow: 0 10px 22px rgba(2,6,23,.10); }
    button:active{ transform: translateY(1px); box-shadow: 0 6px 14px rgba(2,6,23,.10); }

    /* Keep the small "pill" badges aligned on the same vertical line across buttons */
    .btnLeft{ display:flex; align-items:center; gap:10px; flex: 1 1 auto; min-width: 0; }
    .btnLabel{ flex: 1 1 auto; min-width: 0; }
    .pill{
      font-size: 10px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(15,23,42,.06);
      border: 1px solid rgba(15,23,42,.08);
      color: rgba(15,23,42,.72);
      font-weight: 700;
    }

    .meta{
      margin-top: 12px;
      border-top: 1px dashed rgba(100,116,139,.35);
      padding-top: 10px;
    }
    #shortcutDisplay{ font-size: 12px; color: var(--text); line-height: 1.4; font-weight: 700; }
    #recordHint{ font-size: 12px; color: #0f766e; display:none; margin-top: 6px; line-height: 1.35; }
    #warn{ font-size: 11px; color: #b91c1c; display:none; margin-top: 8px; line-height: 1.35; }
    .muted{ font-size: 11px; color: var(--muted); margin-top: 6px; line-height: 1.35; }

    svg{ display:block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="logo" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 7h-2a2 2 0 0 0-2 2v2" stroke="rgba(37,99,235,.9)" stroke-width="2" stroke-linecap="round"/>
          <path d="M15 7h2a2 2 0 0 1 2 2v2" stroke="rgba(16,185,129,.9)" stroke-width="2" stroke-linecap="round"/>
          <path d="M9 17h-2a2 2 0 0 1-2-2v-2" stroke="rgba(16,185,129,.9)" stroke-width="2" stroke-linecap="round"/>
          <path d="M15 17h2a2 2 0 0 0 2-2v-2" stroke="rgba(37,99,235,.9)" stroke-width="2" stroke-linecap="round"/>
          <rect x="8" y="8" width="8" height="8" rx="2" stroke="rgba(15,23,42,.55)" stroke-width="2"/>
        </svg>
      </div>
      <div class="titleWrap">
        <div class="title">RegionShot</div>
        <div class="subtitle">빠른 영역 캡쳐 · 단축키 설정</div>
      </div>

      <div style="flex:1"></div>
      <select id="langSelect" aria-label="Language" style="height:32px;min-width:110px;max-width:100%;flex:0 1 120px;border-radius:10px;border:1px solid var(--border);padding:0 8px;font-weight:700;color:var(--text);background:#fff;margin-left:auto;">
        <option value="ko">한국어</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
        <option value="zh">中文</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
        <option value="nl">Nederlands</option>
      </select>
    </div>

    <div class="actions">
      <button id="captureBtn">
        <span class="btnLeft">
          <span class="btnLabel">영역 캡쳐 시작</span>
          <span class="pill">캡쳐</span>
        </span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M10 7l5 5-5 5" stroke="rgba(15,23,42,.6)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <button id="setShortcutBtn">
        <span class="btnLeft">
          <span class="btnLabel">단축키 지정</span>
          <span class="pill">설정</span>
        </span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M7 12h10" stroke="rgba(15,23,42,.6)" stroke-width="2" stroke-linecap="round"/>
          <path d="M12 7v10" stroke="rgba(15,23,42,.6)" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <div class="meta">
      <div id="shortcutDisplay">단축키: Ctrl+Shift+1</div>
      <div id="recordHint">지정할 키를 동시에 눌러주세요…</div>
      <div class="muted">단축키는 선택 모드에서만 적용됩니다.</div>
      <div id="warn">이 페이지에서는 확장이 실행되지 않을 수 있습니다.</div>
    </div>
  </div>
  <script src="popup.js"></script>






</body>
</html>
